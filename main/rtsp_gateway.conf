# =========================
# RKMediaGateway 配置文件
# 格式：key=value
# 注释：以 # 或 ; 开头
# =========================

# -------------------------
# MediaGatewayConfig（主网关配置）
# -------------------------

# 是否启用 RTSP 输出链路：1=启用，0=禁用
GATEWAY_ENABLE_RTSP=1
# 是否启用 RTMP 输出链路：1=启用，0=禁用
GATEWAY_ENABLE_RTMP=0
# 是否启用 GB28181 输出链路：1=启用，0=禁用
GATEWAY_ENABLE_GB28181=1

# 全局编码帧率（fps）
GATEWAY_FPS=30
# 全局编码目标码率（bit/s）
GATEWAY_BITRATE=2097152
# GOP 长度（关键帧间隔）
GATEWAY_GOP=30
# 码率控制模式（MPP_ENC_RC_MODE_*，常用 CBR=2）
GATEWAY_RC_MODE=2

# H264 Profile（66/77/100）
GATEWAY_H264_PROFILE=100
# H264 Level（如 40 表示 4.0）
GATEWAY_H264_LEVEL=40
# 是否启用 CABAC：1=启用，0=关闭
GATEWAY_H264_CABAC_EN=1

# 编码 QP 初始值
GATEWAY_QP_INIT=30
# P/B 帧最小 QP
GATEWAY_QP_MIN=22
# P/B 帧最大 QP
GATEWAY_QP_MAX=44
# I 帧最小 QP
GATEWAY_QP_MIN_I=20
# I 帧最大 QP
GATEWAY_QP_MAX_I=40
# 相邻帧 QP 最大步长
GATEWAY_QP_MAX_STEP=8

# 低延迟模式：1=启用，0=关闭
GATEWAY_LOW_LATENCY_MODE=1
# 统计日志输出周期（秒）
GATEWAY_STATS_INTERVAL_SEC=1
# 采集失败后的重试间隔（毫秒）
GATEWAY_CAPTURE_RETRY_MS=5
# 最大连续失败次数，超过则主循环退出
GATEWAY_MAX_CONSECUTIVE_FAILURES=30

# 本地录像文件路径，留空表示不录制
GATEWAY_RECORD_FILE_PATH=
# 本地录像每隔多少帧 fflush 一次
GATEWAY_RECORD_FLUSH_INTERVAL_FRAMES=30
# 配置文件路径钩子（日志展示用），通常保持为当前 conf 路径
GATEWAY_CONFIG_FILE_PATH=rtsp_gateway.conf

# -------------------------
# RtspSinkConfig（RTSP 输出配置）
# -------------------------

# RTSP sink 名称（用于日志）
RTSP_NAME=rtsp
# RTSP URL 中的 session 名称（rtsp://ip:port/session）
RTSP_SESSION_NAME=live
# RTSP 服务监听 IP
RTSP_SERVER_IP=0.0.0.0
# RTSP 服务监听端口
RTSP_SERVER_PORT=8554
# 是否启用 RTSP 鉴权：1=启用，0=关闭
RTSP_AUTH_ENABLE=0
# RTSP 鉴权用户名（auth_enable=1 时生效）
RTSP_USER=admin
# RTSP 鉴权密码（auth_enable=1 时生效）
RTSP_PASSWORD=123456
# RTSP sink 发送队列长度
RTSP_QUEUE_CAPACITY=32

# -------------------------
# RtmpSinkConfig（RTMP 输出配置）
# -------------------------

# RTMP sink 名称（用于日志）
RTMP_NAME=rtmp
# RTMP 推流地址（enable_rtmp=1 时必须有效）
RTMP_PUBLISH_URL=rtmp://192.168.1.2/live/stream
# RTMP sink 发送队列长度
RTMP_QUEUE_CAPACITY=64
# RTMP 断线重连间隔（毫秒）
RTMP_RECONNECT_INTERVAL_MS=1000
# RTMP 建连超时（毫秒）
RTMP_CONNECT_TIMEOUT_MS=3000
# 是否启用音频通道标记（当前主要用于元数据）
RTMP_AUDIO_ENABLED=0
# RTMP 元数据中的视频宽度
RTMP_VIDEO_WIDTH=1920
# RTMP 元数据中的视频高度
RTMP_VIDEO_HEIGHT=1080
# RTMP 元数据中的视频帧率
RTMP_VIDEO_FPS=30
# RTMP 元数据中的视频码率（bit/s）
RTMP_VIDEO_BITRATE=2097152
# RTMP 元数据中的编码名称
RTMP_VIDEO_CODEC_NAME=H264
# RTMP 元数据中的编码器名称
RTMP_ENCODER_NAME=RKMediaGateway

# -------------------------
# Gb28181SinkConfig（GB28181 输出配置）
# -------------------------

# GB28181 sink 名称（用于日志）
GB28181_NAME=gb28181
# SIP 平台 IP
GB28181_SERVER_IP=192.168.1.1
# SIP 平台端口
GB28181_SERVER_PORT=5060
# SIP 平台域
GB28181_SERVER_DOMAIN=3402000000
# SIP 平台 ID
GB28181_SERVER_ID=34020000002000000001

# 设备国标 ID
GB28181_DEVICE_ID=34020000001320000001
# 设备域（留空时建议与 SERVER_DOMAIN 一致）
GB28181_DEVICE_DOMAIN=3402000000
# 设备 SIP 鉴权密码
GB28181_DEVICE_PASSWORD=12345678

# 本地 SIP 绑定 IP（通常 0.0.0.0）
GB28181_BIND_IP=0.0.0.0
# 本地 SIP 监听端口
GB28181_LOCAL_SIP_PORT=5060
# SIP Contact 对外声明 IP（NAT 场景填公网或映射 IP）
GB28181_CONTACT_IP=192.168.1.100
# SDP 中对外声明的媒体 IP
GB28181_MEDIA_IP=192.168.1.100
# 本地 RTP 端口（也会写入 SDP）
GB28181_MEDIA_PORT=30000

# REGISTER 有效期（秒）
GB28181_REGISTER_EXPIRES=3600
# 心跳周期（秒）
GB28181_KEEPALIVE_INTERVAL=60
# 注册失败重试间隔（秒）
GB28181_REGISTER_RETRY_INTERVAL=5

# 设备名称（DeviceInfo/Catalog）
GB28181_DEVICE_NAME=RK3568 Camera
# 厂商名称
GB28181_MANUFACTURER=Topeet
# 型号
GB28181_MODEL=RKMediaGateway
# 固件版本
GB28181_FIRMWARE=1.0.0
# 通道 ID
GB28181_CHANNEL_ID=34020000001320000001
# SIP User-Agent
GB28181_USER_AGENT=RKMediaGateway-GB28181/1.0
# GB28181 sink 发送队列长度
GB28181_QUEUE_CAPACITY=64
